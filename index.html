<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartoon Doc</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="introContainer">
    <video id="introVideo" poster="assets/intro-poster.jpg" playsinline muted preload="auto">
      <source src="assets/intro.mp4" type="video/mp4">
    </video>
    <div class="intro-controls">
      <button id="startIntroBtn" hidden>Iniciar Intro</button>
      <button id="skipIntroBtn">Pular Intro</button>
    </div>
  </div>

  <section id="profiles" hidden>
    <h1>Quem está assistindo?</h1>
    <div id="profilesGrid" role="list"></div>
  </section>

  <main id="player" hidden>
    <button id="backToProfilesBtn">Voltar aos Perfis</button>
    <h2 id="playerTitle">Assistindo como: <span></span></h2>
    <div class="video-wrapper">
      <video controls poster="assets/intro-poster.jpg">
        <source src="assets/intro.mp4" type="video/mp4">
        Seu navegador não suporta a tag de vídeo.
      </video>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
